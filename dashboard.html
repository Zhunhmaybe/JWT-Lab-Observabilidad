<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JWT Lab — Entorno CTF</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; font-size: 14px; height: 100vh; overflow: hidden; display: flex; flex-direction: column;}
  header { padding: 14px 20px; border-bottom: 1px solid #1e2433; display: flex; justify-content: space-between; background: #0b0d13;}
  header h1 { font-size: 16px; font-weight: 600; color: #fff; }
  
  .split-container { display: flex; flex: 1; overflow: hidden; }
  .panel { width: 50%; overflow-y: auto; padding: 20px; }
  .left-panel { border-right: 2px solid #1e2433; background: #0f1117; }
  .right-panel { background: #151923; }
  
  h2 { font-size: 15px; margin-bottom: 15px; color: #94a3b8; border-bottom: 1px solid #1e2433; padding-bottom: 8px;}
  
  /* Estilos Monitor (Izquierda) */
  #log-list { display: flex; flex-direction: column; gap: 8px; }
  .entry { background: #1a1f2e; border: 1px solid #1e2433; border-radius: 6px; padding: 10px; cursor: pointer; }
  .entry.attack { border-left: 4px solid #ef4444; } .entry.ok { border-left: 4px solid #22c55e; } .entry.warn { border-left: 4px solid #f59e0b; }
  .badge { font-size: 11px; padding: 3px 6px; border-radius: 4px; font-weight: bold;}
  .badge-200 { background: #14532d; color: #4ade80; } .badge-401, .badge-403 { background: #7f1d1d; color: #fca5a5; } .badge-attack { background: #450a0a; color: #f87171; }
  .entry-detail { display: none; margin-top: 10px; font-family: monospace; font-size: 12px; color: #7dd3fc; background: #0b0d13; padding: 10px; border-radius: 4px;}
  .entry-detail.open { display: block; }
  
  /* Estilos App (Derecha) */
  .form-group { margin-bottom: 15px; }
  input[type="text"], input[type="password"] { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #2d3548; background: #0f1117; color: white; margin-top: 5px;}
  button { width: 100%; padding: 10px; border-radius: 6px; border: none; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px;}
  button:hover { background: #2563eb; }
  button.danger { background: #ef4444; } button.danger:hover { background: #dc2626; }
  
  .card { background: #1a1f2e; border: 1px solid #2d3548; border-radius: 8px; padding: 20px; margin-bottom: 20px;}
  textarea { width: 100%; height: 80px; background: #0b0d13; color: #4ade80; border: 1px solid #2d3548; padding: 10px; font-family: monospace; font-size: 11px; resize: none; margin-bottom: 10px;}
  #response-box { background: #0b0d13; color: #e2e8f0; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 12px; min-height: 50px; white-space: pre-wrap;}
</style>
</head>
<body>
<header>
  <h1>JWT Lab — Observabilidad y Explotación</h1>
  <span id="conn-status" style="color:#64748b">conectando SSE…</span>
</header>

<div class="split-container">
  <div class="panel left-panel">
    <h2>Tráfico en Tiempo Real</h2>
    <div id="log-list"><div style="color: #64748b; text-align: center; margin-top: 20px;">Esperando peticiones...</div></div>
  </div>

  <div class="panel right-panel">
    <h2>Aplicación Vulnerable</h2>
    
    <div class="card" id="login-section">
      <h3 style="margin-bottom: 10px; color: #fff;">Iniciar Sesión</h3>
      <p style="font-size: 12px; color: #94a3b8; margin-bottom: 15px;">Usuarios de prueba: alumno1/1234 | admin/admin123</p>
      <div class="form-group">
        <label>Usuario:</label>
        <input type="text" id="username" value="alumno1">
      </div>
      <div class="form-group">
        <label>Contraseña:</label>
        <input type="password" id="password" value="1234">
      </div>
      <button onclick="doLogin()">Ingresar</button>
    </div>

    <div class="card" id="app-section" style="display: none;">
      <h3 style="margin-bottom: 10px; color: #fff;">Panel de Control</h3>
      <p style="font-size: 12px; color: #94a3b8; margin-bottom: 5px;">Tu Token JWT actual (Cópialo para explotarlo):</p>
      <textarea id="token-box" readonly></textarea>
      
      <div style="display: flex; gap: 10px;">
        <button onclick="fetchData('/private')">Test: Zona User</button>
        <button onclick="fetchData('/admin')">Test: Zona Admin (Segura)</button>
      </div>
      <button class="danger" onclick="fetchData('/admin-vulnerable')">Test: Zona Admin (Vulnerable)</button>
      <button style="background: #475569;" onclick="logout()">Cerrar Sesión</button>
      
      <h4 style="margin-top: 15px; margin-bottom: 5px; color: #94a3b8;">Respuesta del Servidor:</h4>
      <div id="response-box">...</div>
    </div>
  </div>
</div>

<script>
// --- Lógica Frontend App ---
let currentToken = localStorage.getItem('jwt_token') || null;
if(currentToken) showApp();

async function doLogin() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username: u, password: p})
  });
  const data = await res.json();
  if(res.ok) {
    currentToken = data.token;
    localStorage.setItem('jwt_token', currentToken);
    showApp();
  } else {
    alert(data.detail || "Error al iniciar sesión");
  }
}

function showApp() {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('app-section').style.display = 'block';
  document.getElementById('token-box').value = currentToken;
  document.getElementById('response-box').innerText = "...";
}

function logout() {
  currentToken = null;
  localStorage.removeItem('jwt_token');
  document.getElementById('login-section').style.display = 'block';
  document.getElementById('app-section').style.display = 'none';
}

async function fetchData(route) {
  const box = document.getElementById('response-box');
  box.innerText = "Cargando...";
  try {
    const res = await fetch(route, {
      headers: {'Authorization': 'Bearer ' + currentToken}
    });
    const data = await res.json();
    box.innerText = `Status: ${res.status}\n\n${JSON.stringify(data, null, 2)}`;
  } catch (e) {
    box.innerText = "Error de conexión";
  }
}

// --- Lógica SSE (Observabilidad) ---
let events = [];
function renderLogs() {
  const el = document.getElementById('log-list');
  el.innerHTML = events.slice(-30).reverse().map(ev => {
    const cls = ev.attack_detected ? 'attack' : (ev.status >= 200 && ev.status < 300 ? 'ok' : 'warn');
    const badge = ev.status===200?'badge-200':(ev.status===401||ev.status===403?'badge-401':'badge-attack');
    return `<div class="entry ${cls}" onclick="this.querySelector('.entry-detail').classList.toggle('open')">
      <div><strong>${ev.method}</strong> ${ev.path} <span class="badge ${badge}">${ev.status}</span> ${ev.attack_detected ? '<span class="badge badge-attack">'+ev.attack_detected+'</span>' : ''}</div>
      <div class="entry-detail">IP: ${ev.ip} <br><br>Token Decodificado:<br>${JSON.stringify(ev.token_decode, null, 2)}</div>
    </div>`;
  }).join('');
}

const es = new EventSource('/dashboard/stream');
es.onopen = () => document.getElementById('conn-status').textContent = 'SSE Conectado';
es.onmessage = (e) => {
  events.push(JSON.parse(e.data));
  renderLogs();
};
</script>
</body>
</html>
